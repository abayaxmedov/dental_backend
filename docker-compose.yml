
services:
  db:
    image: postgres:15
    container_name: dental_db
    restart: always
    environment:
      POSTGRES_DB: dental
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: dental_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 300M

  web:
    build: .
    container_name: dental_web
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/static
    expose:
      - 8000
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 500M

  nginx:
    image: nginx:stable-alpine
    container_name: dental_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: